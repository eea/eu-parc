elements: |-
  context_and_consent:
    '#type': webform_wizard_page
    '#title': 'Context and Consent'
    training_in_parc:
      '#type': checkbox
      '#title': 'I confirm that I have read this information and agree that the information provided may be used in the terms mentioned above.'
      '#description': '<h4><strong>Context and Consent</strong></h4><p>PARC facilitates staff exchange among partners for all those interested in receiving on-site, hands-on training in other laboratories. Staff exchange may be particularly useful to acquire complementary expertise on analytical methods, learn new techniques, and gain access to specific instruments and methods not available in the applicant’s institutions.</p><p>By filling in this survey you are indicating your availability to act as Host Laboratory. A few questions on institutional details and capacities, staff specific requirements, and working language(s) will follow. Data here obtained will be saved and stored by the National Institute of Health Dr. Ricardo Jorge, Portugal (INSA); names and email contacts will be used solely for the staff exchange process. Data management and handling will follow the General Data Protection Regulation (GDPR) of the EU (2016/679)</p><p>If you have any questions, please contact Carla Trindade Costa (carla.trindade@insa.min-saude.pt).</p><p>Thank you for taking the time to complete this survey.</p><p><strong>Task 9.4 co-leaders</strong><br>João Paulo Teixeira &amp; Carla Trindade Costa<br>NATIONAL INSTITUTE OF HEALTH DOUTOR RICARDO JORGE<br>Porto| Portugal<br><a href="https://www.insa.min-saude.pt">www.insa.min-saude.pt</a></p><h5>&nbsp;</h5>'
      '#title_display': inline
      '#description_display': before
      '#required': true
  institutional_details:
    '#type': webform_wizard_page
    '#title': 'Institutional Details'
    dates:
      '#type': textfield
      '#title': Name
      '#description': '<h4><strong>Institutional Details</strong></h4><h4>&nbsp;</h4><h5><strong>Name</strong></h5>'
      '#title_display': invisible
      '#description_display': before
      '#required': true
    spacer_2:
      '#type': webform_markup
      '#markup': '<br>'
    organiser:
      '#type': textfield
      '#title': Address
      '#description': '<h5><strong>Address</strong></h5>'
