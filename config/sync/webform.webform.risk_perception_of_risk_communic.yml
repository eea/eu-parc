        ' Academia': ' Academia'
        'Association of Professional Bodies': 'Association of Professional Bodies'
        NGO: NGO
      '#other__option_label': Other
      '#other__title': 'Please, specify:'
      '#other__size': '2'
    is_your_current_position:
