        'Attending seminars/webinars/courses ': 'Attending seminars/webinars/courses '
      '#answers':
        Never: Never
        'Periodically (e.g. every 2-10 years)': 'Periodically (e.g. every 2-10 years)'
        'Frequently (at least once a year)': 'Frequently (at least once a year)'
    do_you_believe_that_communication_training_is_necessary_for_your:
