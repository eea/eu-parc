      '#options':
        'Yes': 'Yes'
        'No': 'No'
    how_much_do_you_believe_you_influence_the_target_audience:
      '#type': webform_likert
      '#title': 'How much do you believe you influence the target audience?'
      '#questions':
        'How much do you believe you influence the target audience?': 'How much do you believe you influence the target audience?'
      '#answers':
        1: 'No influence at all'
        2: 'Little influence'
        3: 'Medium Influence'
        4: 'Considerable Influence'
        5: 'High influence'
    in_regard_to_the_previous_question_on_what_do_you_base_your_answ:
      '#type': webform_checkboxes_other
      '#title': 'In regard to the previous question, on what do you base your answer? (Choose all that apply)'
      '#options':
        'Reactions from the media (TV, radio, PRESS)': 'Reactions from the media (TV, radio, PRESS)'
        'Publication / posts on internet sites, personal blogs, social media': 'Publication / posts on internet sites, personal blogs, social media'
        'Monitoring with a Questionnaire-based consumer survey': 'Monitoring with a Questionnaire-based consumer survey'
        ' Direct feedback through personal communication (e.g., conversations, phone calls, emails, or messages)': ' Direct feedback through personal communication (e.g., conversations, phone calls, emails, or messages)'
      '#other__option_label': Other
      '#other__title': 'Please, specify:'
    when_communicating_a_chemical_hazard_risk_do_you_usually:
      '#type': checkboxes
      '#title': 'When communicating a chemical hazard/ risk, do you usually...'
      '#options':
        'Create your own message': 'Create your own message'
        ' Transmit the message exactly as provided by the risk assessors': ' Transmit the message exactly as provided by the risk assessors'
        'Adapt or reframe messages from other sources': 'Adapt or reframe messages from other sources'
    have_you_ever_personally_experienced_a_health_effect_from_exposu:
      '#type': checkboxes
      '#title': 'Have you ever personally experienced a health effect from exposure to a chemical hazard (e.g., contaminated food, cleaning products, pesticides)?'
      '#options':
        'Yes': 'Yes'
        'No': 'No'
        'I do not know': 'I do not know'
    if_yes_did_this_experience_affect_the_way_you_communicate_or_thi:
      '#type': textfield
      '#title': 'If yes, did this experience affect the way you communicate or think about that hazard?'
  section_3_developing_risk_communication:
    '#type': webform_wizard_page
    '#title': 'Section 3: Developing Risk Communication'
    when_communicating_with_the_target_audience_on_risk_how_importan:
      '#type': webform_likert
      '#title': 'When communicating with the target audience on risk, how important is it to include the following features? '
      '#questions':
        'Use of visual illustration of risk with graphs, diagrams, images and maps': 'Use of visual illustration of risk with graphs, diagrams, images and maps'
        'Comparisons between different hazards according to probability ': 'Comparisons between different hazards according to probability '
        'Description of all uncertainties connected to the risk': 'Description of all uncertainties connected to the risk'
        'Numerical limit values (e.g., Tolerable Daily Intake for a specific chemical in numbers) ': 'Numerical limit values (e.g., Tolerable Daily Intake for a specific chemical in numbers) '
        'Description of different risks for different groups of people. (e.g., difference in risk for different occupational groups) ': 'Description of different risks for different groups of people. (e.g., difference in risk for different occupational groups) '
        'Information on difference between long term and short-term exposure to hazard ': 'Information on difference between long term and short-term exposure to hazard '
        'Information on underestimation of risk by the public (e.g., When risk communicator has the information that the public does not ': 'Information on underestimation of risk by the public (e.g., When risk communicator has the information that the public does not '
        'Information on overestimation of risk by the public   (e.g., When risk communicator has the information that the public perceive': 'Information on overestimation of risk by the public   (e.g., When risk communicator has the information that the public perceive'
        'Description of strategies to avoid exposure to hazard ': 'Description of strategies to avoid exposure to hazard '
      '#answers':
        'Not at all important': 'Not at all important'
        'Slightly important': 'Slightly important'
        'Moderately important': 'Moderately important'
        'Quite important': 'Quite important'
        'Very important': 'Very important'
    when_communicating_risk_how_important_are_the_following_aspects:
      '#type': webform_likert
      '#title': 'When communicating risk, how important are the following aspects of trust for target audience’s risk perception in your view? '
      '#questions':
        'Audience trust in the expert that communicates risk ': 'Audience trust in the expert that communicates risk '
        'Audience trust in the national /European institutions/ authorities ': 'Audience trust in the national /European institutions/ authorities '
        'Audience trust in scientific data ': 'Audience trust in scientific data '
      '#answers':
        'Not at all important': 'Not at all important'
        'Slightly important': 'Slightly important'
        'Moderately important': 'Moderately important'
        'Quite important': 'Quite important'
        'Very important': 'Very important'
    please_rate_statements_on_risk_communication_to_which_degree_you:
      '#type': webform_likert
      '#title': 'Please rate statements on risk communication to which degree you agree or disagree with them.'
      '#questions':
        'When communicating risk, it is important to distinguish between hazard and risk. ': 'When communicating risk, it is important to distinguish between hazard and risk. '
        "Risk communication shouldn't be influenced by the public's perceptions of risk. ": "Risk communication shouldn't be influenced by the public's perceptions of risk. "
        'The principles (e.g., objectivity, impartiality) upon which risk communication is based are consistent across all sectors (e.g.,': 'The principles (e.g., objectivity, impartiality) upon which risk communication is based are consistent across all sectors (e.g.,'
        'Describing all uncertainties, related to risk and hazard, confuses people. ': 'Describing all uncertainties, related to risk and hazard, confuses people. '
        'Risk communication should be practiced/done in collaboration with the involved stakeholders. ': 'Risk communication should be practiced/done in collaboration with the involved stakeholders. '
        'News media are more interested in crisis communication, where the presentation of risk is often exaggerated. ': 'News media are more interested in crisis communication, where the presentation of risk is often exaggerated. '
      '#answers':
        'Disagree fully': 'Disagree fully'
        'Disagree partly': 'Disagree partly'
        'Neither agree nor disagree': 'Neither agree nor disagree'
        'Agree partly': 'Agree partly'
        'Agree fully': 'Agree fully'
  section_4_role_of_risk_communicator:
    '#type': webform_wizard_page
    '#title': 'Section 4: Role of Risk Communicator'
    please_rate_statements_on_risk_perception_to_which_degree_you_ag:
      '#type': webform_likert
      '#title': 'Please rate statements on risk perception to which degree you agree or disagree with them. '
      '#questions':
        'People’s risk perceptions include/depend on their beliefs and attitudes. ': 'People’s risk perceptions include/depend on their beliefs and attitudes. '
        "Risk perceptions aren't influenced by people’s judgements and feelings (personal experience). ": "Risk perceptions aren't influenced by people’s judgements and feelings (personal experience). "
        'Risk perceptions refl objectivity, impartiality) upon which risk communication is based are consistent across all sectors (e.g.,': 'Risk perceptions refl objectivity, impartiality) upon which risk communication is based are consistent across all sectors (e.g.,'
        'Risk communication should be based on evidence from risk assessments but should also consider laypeople’s hazard consideration/i': 'Risk communication should be based on evidence from risk assessments but should also consider laypeople’s hazard consideration/i'
        'People who have previously experienced an incident related to a hazard, tend to feel that there are more probabilities of facing': 'People who have previously experienced an incident related to a hazard, tend to feel that there are more probabilities of facing'
        'When people learn about a hazard for the first time, they tend to feel that this new hazard is more likely to occur than other w': 'When people learn about a hazard for the first time, they tend to feel that this new hazard is more likely to occur than other w'
        'The more specific knowledge people gain about a hazard, the less they rely on their intuition about risk related to this hazard.': 'The more specific knowledge people gain about a hazard, the less they rely on their intuition about risk related to this hazard.'
