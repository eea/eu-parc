        'Lack of support from colleagues/ Few human resources devoted to risk communication': 'Lack of support from colleagues/ Few human resources devoted to risk communication'
        'Difficulties when collaborating with experts in chemical risks': 'Difficulties when collaborating with experts in chemical risks'
        'Unclear distribution of roles': 'Unclear distribution of roles'
        'Unclear distribution of responsibilities': 'Unclear distribution of responsibilities'
        'Lack of budget allocated for communication': 'Lack of budget allocated for communication'
        'Interference by risk managers with respect to when and what will be communicated': 'Interference by risk managers with respect to when and what will be communicated'
      '#other__option_label': Other
