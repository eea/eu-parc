id: questionnaire_on_the_use_of_hbm
title: 'Questionnaire on the use of HBM in policy'
description: '<p><span lang="EN-US">The Environment and Health Partnerships (EHP) bring together Member States and stakeholders with a shared interest in specific thematic areas. The Partnership on Human Biomonitoring (HBM)&nbsp; brings together 20 Member States to extend the application of HBM as a scientific tool to inform decisions in regulatory hazardous chemicals and public health. Within this Partnership a Working Group on the use of HBM in a policy context is identifying this use.</span></p><p><span lang="EN-US">In order to compile an overview of the use of HBM in policy, a questionnaire was developed. The results of this questionnaire will be used to report on the use of HBM in a policy context; in addition, a webinar will be organised based on the results, during which the main findings will be explained and good practices will be showcased.</span></p><p><span lang="EN-US">We kindly request some essential personal and professional details in this application form. The anonym information will be only used for this survey data analysis. Data collected will be saved and stored for the duration of PARC<strong>.</strong>&nbsp;Data management and handling will follow the General Data Protection Regulation (GDPR) of the EU (2016/679).</span></p><p><span lang="EN-GB">If you have any questions, please contact Maja Mampaey (</span><a href="mailto:maja.mampaey@vlaanderen.be"><span lang="EN-GB">maja.mampaey@vlaanderen.be</span></a><span lang="EN-GB">).</span></p>'
categories:
  - HBM
