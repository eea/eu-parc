      '#type': url
      '#title': link_2
      '#more': '<h4><strong>Course</strong><br>III. Dissemination</h4><p>If the course is organised under the Scientific Coordination of PARC and focused on a PARC topic, it would be relevant to add it to the PARC training plan. If you agree to this, you will be asked to provide some course details or a draft agenda, some practical information (possible transportation, accommodation, etc.), and to revise the application form template (all templates available <a href="https://agenceanses.sharepoint.com/:f:/r/sites/PARC-ANSES/Consortium/6-PARC%20templates/13-Trainings?csf=1&amp;web=1&amp;e=neQq4o">here</a>). With this information, Task 9.4 partners will prepare with you a news item for publication on the PARC website and an application form.</p><p>If this training is not coordinated by PARC, it can still be announced on PARC website if you provide us a few details <a href="https://www.eu-parc.eu/form/t9-4-mapping-available-training">here</a>.</p><p>&nbsp;</p><h5><strong>Please use the templates provided above to prepare the required documents. Once completed, kindly share them below via a link or send them by email to the T9.4 team </strong><a href="(carla.trindade@insa.min-saude.pt"><strong>(carla.trindade@insa.min-saude.pt</strong></a><br><strong>or </strong><a href="mailto:mariana.bessa@insa.min-saude.pt"><strong>mariana.bessa@insa.min-saude.pt</strong></a><strong>). &nbsp;</strong></h5><h5>&nbsp;</h5>'
