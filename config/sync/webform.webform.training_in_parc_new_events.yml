elements: |-
  context_and_consent:
    '#type': webform_wizard_page
    '#title': 'Context and Consent'
    training_in_parc:
      '#type': checkbox
      '#title': 'I confirm that I have read and I accept the information stated above'
      '#description': '<h4><strong>Training in PARC</strong></h4><p>During the initial years of PARC, various project partners have joined to organize training sessions on specific topics. These efforts aimed either to enhance the skills of other activity partners or to raise general awareness on key risk assessment (RA) topics. This constitutes an important contribution to OO13 (operational objective) of PARC that aims to build capacities by developing and carrying out training and exchange programmes in chemical RA and adds to the structured work established by Task 9.4 on Training.</p><p>Contributing to the monitoring of PARC''s progress and success as well as the harmonisation of the training activities carried out under the partnership, this form collects information on event features, dissemination details, and training materials. At the same time, it provides guidance to PARC partners organizing training events that aren''t included in the PARC Training plan (available here).</p><p>Filling in this form will facilitate your communication with all relevant PARC tasks, namely T1.3 (Impact evaluation and Monitoring of the performance indicators of the Partnership), T3.2 (Communication, dissemination, and awareness), and T9.4 (Training).</p><p>If you have any questions concerning this form, please contact T9.4 co-leader, Carla Trindade Costa (<a href="mailto:carla.trindade@insa.min-saude.pt">carla.trindade@insa.min-saude.pt</a>).</p><p>Data obtained here will be saved and stored by the National Institute of Health Dr Ricardo Jorge, Portugal (INSA). Data management and handling will follow the General Data Protection Regulation (GDPR) of the EU (2016/679).</p><p>Thank you for taking the time and focus to complete this survey.</p><p><strong>Task 9.4 co-leaders</strong><br>João Paulo Teixeira &amp; Carla Trindade Costa<br>NATIONAL INSTITUTE OF HEALTH DOUTOR RICARDO JORGE<br>Porto| Portugal<br><a href="https://www.insa.min-saude.pt">www.insa.min-saude.pt</a></p><p>&nbsp;</p>'
      '#title_display': inline
      '#description_display': before
      '#required': true
  spacer_1:
